<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Freelancer</title>
</head>
<body>
    <h1>Cadastro na Plataforma Freelaninja</h1>
    <form action="" method="post">
    <h3>Informar os dados pessoais:</h3>
        <label for="nome">Nome:</label><input type="text" name="nomecad" id="nome"><br>
        <label for="tel">Telefone:</label><input type="tel" pattern="[0-9]{2}-[0-9]{4,5}-[0-9]{4}" id="telefone" name="telefonecad"><br>
        <label for="email">Email:</label><input type="email" name="emailcad"><br>
        <label for="areaatuacao">Área de atuação</label><input type="text" name="areaatuacaocad" id="areaatuacao"><br> 
    <h3>Área de Atuação</h3>
      <select name="area">
        <option>Desenvolvimento</option>
        <option>Design</option>
        <option>Marketing</option>
        <option>Redação</option>
        <option>Tradução</option>
        <option>Outro</option>
      </select>
    <h3>Serviços Prestados</h3>
        <label><input type="checkbox" name="servicos"> Desenvolvimento Web</label><br>
        <label><input type="checkbox" name="servicos"> Apps Mobile</label><br>
        <label><input type="checkbox" name="servicos"> UI/UX Design</label><br>
        <label><input type="checkbox" name="servicos"> SEO</label><br>
        <label><input type="checkbox" name="servicos"> Copywriting</label><br>
        <label><input type="checkbox" name="servicos"> Tradução</label><br>
     <h3>Portifólio</h3>
      Link: <a href="seulink.com">Meu portifólio</a> 
      <h3>Redes Sociais</h3>
      <a href="instagram.com">Instagram</a><br>
      <a href="github.com">Github</a><br>
      <a href="linkedin.com">Linkedin</a><br><br>
      <button type="submit">Cadastrar</button>







    </form>
    
</body>
</html>
