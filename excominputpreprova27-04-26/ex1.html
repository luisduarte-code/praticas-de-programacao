<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site do pet</title>
</head>
<body>
    <h1>Cadastre um novo pet</h1>
        <form action="" method="post">
        <label for="nomedoanimal">Nome do Pet: </label><input type="text" id="nomedoanimal" name="nomedopet"><br><br>
        <label for="especiedoanimal">Espécie do pet:</label><input type="text" name="especiedopet" id="especiedoanimal"><br><br>
        <label for="idadedoanimal">Idade:</label><input type="number" name="idadedopet" id="idadedoanimal"><br><br>
        <label for="peso">Peso em KG:</label><input type="number" id="pesodoanimal" name="pesodopet"><br><br>
        <label for="fotodoanimal">Foto do pet:</label><input type="file" id="fotodoanimal" name="fotodopet" accept="image/*" capture="user"><br><br>

<button type="submit">Cadastrar</button>
    </form>
</body>
</html>
