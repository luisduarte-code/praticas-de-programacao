<!DOCTYPE html>
<html lang="pt-br">
<head>
<style>
div{
    padding: 10px;
    background-color: #f6f6f6;
    overflow: hidden;
}
input[type=text],input[type=email],textarea, select{
    font: 17px Calibri;
    width: 100%;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 4px;
}
input[type=button]{
    font: 17px Calibri;
    width: auto;
    float: right;
    cursor: pointer;
    padding: 7px;
}
</style>
</head>
<body>
    <div>
        <div>
            <input type="text" id="txtName" placeholder="Nome Cliente">
        </div>
        <div>
            <input type="text" id="txtIdade" placeholder="Idade Cliente">
        </div>
        <div>
            <input type="email" id="inputEmail" placeholder="Email Cliente">
        </div>
        <div>
            <select id="SelPais">
                <option value="">-- Escolha seu País--</option>
                <option value="India">India</option>
                <option value="Brasil">Brasil</option>
                <option value="Japao">Japao</option>
                <option value="EUA">EUA</option>


            </select>
        </div>
        <div>
            <input type="button" id="bt" value="Salvar" onclick="Salvar()">
        </div>
    </div>
    <script>
function Salvar(){
    //pegando variaveis
    var name = document.getElementById('txtName').value;//na minha pagina em html.pegando elemeneto pelo id tal...
    var idade = document.getElementById('txtIdade').value;
    var email = document.getElementById('inputEmail').value;
    var pais = document.getElementById('SelPais').value;
    
    var data =`
    Nome:${name}
    Idade${idade}
    Email:${email}
    País:${pais}`
confirm(data);
}
</script>
    </script>
</body>
</html>
