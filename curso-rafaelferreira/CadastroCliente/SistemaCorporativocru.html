    <div>
        <div id="myModal"><!--esta servindo como um identificador para o javascript-->

                <div>
                    <div>
                        <h3>CADASTRO DE CLIENTE</h3>

                    <div>
                        <form action="#">
                            <fieldset>
                                <legend>Dados Pessoais</legend>

                                            <option value="MS">MS</option>
                                            <option value="MT">MT</option>
                                            <option value="PA">PA</option>

        <!-- uma div que encobre todos os campos no qual o usuario deve inserir os seus dados-->
        <div>
            <div>
                <h3>CLIENTES CADASTRADOS</h3>
            </div>
            
            <div>
                <a href="#" onclick="document.getElementById('myModal').style.display='block';">
                    Novo
                </a>    
                <div>
                    <table id="ListaCadastro">
                        <thead>
                            <tr>
                                <th>Documento</th>
                                <th>NOME</th>
                                <th>EMAIL</th>
                                <th>TELEFONE</th>
                                <th>AÇÕES</th>
                            </tr>
                        </thead>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <!--Aqui mostra todos os clientes cadastrados-->
    <script src="resources/js/jquery.min.js"></script>
    <script>
        function SalvarCadastro()
        {            
            var Documento = $("#Documento").val();//pega o texto que o usuário digitou no <input id="Documento">. ele vai pegar o que o usuari=o inseriu no campo.
            var Nome= $("#nome").val();//document.getElementById('nome').value= se fosse usado javascript puro
            var Email= $("#email").val();
            var Telefone= $("#telefone").val();
            var validar = 1; 
            
            if(Documento == "")// if para validar se um campo é vazio ele retorna falando que é obrigatório e deixa o botao vermelho
            {
                validar = 0;
                alert('O campo documento é obrigatório');
                $("#Documento").css("background-color", "red");//seleciona o elemento id="documento" e define o background-color com red mudando o fundo
            }
            
            if(Nome == "")
            {
                alert('O campo Nome é obrigatório');// mesma coisa que no primeiro if
                $("#nome").css("background-color", "red");
                validar = 0;
            }
            
            if(validar == 1)// aqui se o validar for 1 ou seja, passar pelos dois ifs de antes, ele insere os dados na tabela interativa ao chamar a Função AdicionarLinhaTabela e após adicionar ele limpa os dados com a Função LimparCamposForm.
            {
                AdicionarLinhaTabela(Documento, Nome, Email, Telefone);
                LimparCamposForm();
            }
        }
        function AdicionarLinhaTabela(Documento, Nome, Email, Telefone)// o que está entre parentees sao as variávies nos quais sao passado para a Função
        {            
            linhaNova = `
                <tr id="Linha${Documento}">
                    <td>${Documento}</td>
                    <td>${Nome}</td>
                    <td>${Email}</td>
                    <td>${Telefone}</td>
                    <td>
                        <a href="#" onclick="UpdateUsuario('${Documento}')">Editar</a>
                        <a href="#" onclick="RemoveLinha('${Documento}')">Excluir</a>
                    </td>
                </tr>`;//la no inicio atribui um novo id pra cada linha que acabara a identificando para depois ser removida .val() → 📥 pega o valor ${} → 🏷️ cola o valor dentro de um texto

            
            $("#ListaCadastro").prepend(linhaNova);
            document.getElementById('myModal').style.display='none';// $("#myModal").css("display", "none");em jquery
        }
        
        function LimparCamposForm()//a função chamada após preencher os dados
        {
            $("#Documento").val("");
            $("#nome").val("");
            $("#email").val("");
            $("#telefone").val("");
        }
        function RemoveLinha(Documento)//puxa o valor que o documento tem e remove
        {
            $('#Linha'+Documento).remove();
        }
        
        function UpdateUsuario(Documento)
        {
            // Função placeholder, não implementada no original
            alert('Editar usuário ' + Documento);
        }
        
    </script>
    
</body>
